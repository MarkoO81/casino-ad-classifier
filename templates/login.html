<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <title>Login — Casino Ad Classifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 40px 44px 36px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      width: 100%;
      max-width: 380px;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 32px;
    }

    .logo-wrap svg {
      filter: drop-shadow(0 2px 8px rgba(220,38,38,.25));
    }

    .logo-title {
      font-size: 17px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -.02em;
      text-align: center;
    }

    .logo-sub {
      font-size: 12px;
      color: #64748b;
      margin-top: 2px;
      text-align: center;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: #64748b;
      margin-bottom: 6px;
    }

    .field { margin-bottom: 16px; }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      color: #0f172a;
      background: #f8fafc;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.12);
      background: #fff;
    }

    .btn-login {
      width: 100%;
      padding: 11px;
      background: #0f172a;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s;
    }
    .btn-login:hover { background: #1e293b; }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: #dc2626;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 18px;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="login-card">
  <div class="logo-wrap">
    <svg width="64" height="64" viewBox="0 0 40 40" fill="none">
      <path d="M20 20 L20 1 A19 19 0 0 1 33.4 6.6 Z" fill="#dc2626"/>
      <path d="M20 20 L33.4 6.6 A19 19 0 0 1 39 20 Z" fill="#374151"/>
      <path d="M20 20 L39 20 A19 19 0 0 1 33.4 33.4 Z" fill="#dc2626"/>
      <path d="M20 20 L33.4 33.4 A19 19 0 0 1 20 39 Z" fill="#374151"/>
      <path d="M20 20 L20 39 A19 19 0 0 1 6.6 33.4 Z" fill="#dc2626"/>
      <path d="M20 20 L6.6 33.4 A19 19 0 0 1 1 20 Z" fill="#374151"/>
      <path d="M20 20 L1 20 A19 19 0 0 1 6.6 6.6 Z" fill="#dc2626"/>
      <path d="M20 20 L6.6 6.6 A19 19 0 0 1 20 1 Z" fill="#374151"/>
      <circle cx="20" cy="20" r="19" fill="none" stroke="#b45309" stroke-width="1.5"/>
      <circle cx="20" cy="20" r="17" stroke="#ef4444" stroke-width="3"/>
      <line x1="8" y1="8" x2="32" y2="32" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
      <circle cx="20" cy="20" r="4" fill="#fff"/>
      <circle cx="20" cy="20" r="2" fill="#b45309"/>
    </svg>
    <div>
      <div class="logo-title">Casino Ad Classifier</div>
      <div class="logo-sub">Sign in to continue</div>
    </div>
  </div>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST">
    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" name="username" autocomplete="username"
             value="{{ request.form.get('username', '') }}" autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" name="password" autocomplete="current-password">
    </div>
    <button type="submit" class="btn-login">Sign in</button>
  </form>
</div>

</body>
</html>
